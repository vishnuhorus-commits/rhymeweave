<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RhymeWeave V2 • Alliteration + Rhyme Flow Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --accent: #6366f1; }
    body { background:#09090b; color:#f4f4f5; }
    .card { background:#18181b; border:1px solid #27272a; border-radius:1.25rem; }
    textarea, input, select { background:#09090b; border:1px solid #3f3f46; border-radius:.75rem; padding:.75rem; width:100%; }
    button { background:#6366f1; padding:.75rem 1rem; border-radius:.75rem; font-weight:800; }
    button.secondary { background:#27272a; }
    .pill { display:inline-block; padding:.25rem .6rem; border-radius:999px; background:#27272a; margin:.15rem; }
    pre { white-space:pre-wrap; background:#09090b; border:1px solid #27272a; padding:1rem; border-radius:1rem; }
  </style>
</head>
<body>
  <main class="max-w-6xl mx-auto p-4 space-y-6">
    <section class="card p-6">
      <h1 class="text-3xl font-black mb-2">RhymeWeave V2</h1>
      <p class="text-zinc-400">Alliteration sorter, rhyme helper, A-Z cleaner, and writing flow checker.</p>
    </section>

    <section class="card p-6 space-y-4">
      <h2 class="text-xl font-bold">1. Paste Text Here</h2>
      <textarea id="inputText" rows="12" placeholder="Paste your lines here..."></textarea>
      <div class="flex flex-wrap gap-3">
        <button onclick="processText()">Clean + Sort A-Z</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
        <button class="secondary" onclick="downloadTxt()">Download TXT</button>
      </div>
    </section>

    <section class="grid md:grid-cols-3 gap-4">
      <div class="card p-4">
        <h3 class="font-bold">Total Kept</h3>
        <p id="keptCount" class="text-3xl font-black">0</p>
      </div>
      <div class="card p-4">
        <h3 class="font-bold">Duplicates Removed</h3>
        <p id="dupCount" class="text-3xl font-black">0</p>
      </div>
      <div class="card p-4">
        <h3 class="font-bold">Review / Junk</h3>
        <p id="reviewCount" class="text-3xl font-black">0</p>
      </div>
    </section>

    <section class="card p-6 space-y-4">
      <h2 class="text-xl font-bold">2. A-Z Output</h2>
      <div id="letterButtons" class="flex flex-wrap gap-2"></div>
      <pre id="outputText">Your cleaned A-Z output will appear here.</pre>
    </section>

    <section class="card p-6 space-y-4">
      <h2 class="text-xl font-bold">3. Review Not Deleted</h2>
      <pre id="reviewText">Review lines will appear here.</pre>
    </section>
  </main>

  <script>
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    let finalOutput = "";
    let azData = {};
    let reviewLines = [];

    function cleanLine(line) {
      return line
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function isGoodLine(line) {
      if (!line) return false;
      if (line.split(" ").length < 2) return false;
      if (/^\d+$/.test(line)) return false;
      if (!/[A-Z]/.test(line)) return false;
      return true;
    }

    function processText() {
      const raw = document.getElementById("inputText").value;
      const lines = raw.split(/\r?\n/).map(cleanLine);

      azData = {};
      reviewLines = [];
      letters.forEach(l => azData[l] = []);

      const seen = new Set();
      let duplicateCount = 0;

      for (const line of lines) {
        if (!isGoodLine(line)) {
          if (line) reviewLines.push(line);
          continue;
        }

        if (seen.has(line)) {
          duplicateCount++;
          continue;
        }

        seen.add(line);

        const first = line[0];
        if (azData[first]) {
          azData[first].push(line);
        } else {
          reviewLines.push(line);
        }
      }

      letters.forEach(l => azData[l].sort());

      finalOutput = "";
      for (const l of letters) {
        if (azData[l].length) {
          finalOutput += `\n===== ${l} =====\n`;
          finalOutput += azData[l].join("\n") + "\n";
        }
      }

      document.getElementById("outputText").textContent = finalOutput.trim() || "No clean lines found.";
      document.getElementById("reviewText").textContent = reviewLines.join("\n") || "No review lines.";
      document.getElementById("keptCount").textContent = seen.size;
      document.getElementById("dupCount").textContent = duplicateCount;
      document.getElementById("reviewCount").textContent = reviewLines.length;

      buildLetterButtons();
    }

    function buildLetterButtons() {
      const box = document.getElementById("letterButtons");
      box.innerHTML = "";
      for (const l of letters) {
        const btn = document.createElement("button");
        btn.className = "secondary";
        btn.textContent = `${l} (${azData[l]?.length || 0})`;
        btn.onclick = () => {
          document.getElementById("outputText").textContent =
            azData[l]?.length ? `===== ${l} =====\n` + azData[l].join("\n") : `No ${l} lines found.`;
        };
        box.appendChild(btn);
      }

      const allBtn = document.createElement("button");
      allBtn.textContent = "SHOW ALL";
      allBtn.onclick = () => {
        document.getElementById("outputText").textContent = finalOutput.trim() || "No clean lines found.";
      };
      box.appendChild(allBtn);
    }

    function clearAll() {
      document.getElementById("inputText").value = "";
      document.getElementById("outputText").textContent = "Your cleaned A-Z output will appear here.";
      document.getElementById("reviewText").textContent = "Review lines will appear here.";
      document.getElementById("keptCount").textContent = "0";
      document.getElementById("dupCount").textContent = "0";
      document.getElementById("reviewCount").textContent = "0";
      document.getElementById("letterButtons").innerHTML = "";
      finalOutput = "";
      azData = {};
      reviewLines = [];
    }

    function downloadTxt() {
      const text = finalOutput.trim();
      if (!text) {
        alert("Run Clean + Sort A-Z first.");
        return;
      }

      const blob = new Blob([text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "RHYMEWEAVE_AZ_CLEAN_OUTPUT.txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    buildLetterButtons();
  </script>
</body>
</html>
